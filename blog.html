---
layout: blog
---

<h2>Recent Posts</h2>
{% for post in site.posts %}
<div class="post_preview">
  <span><a href="{{ post.url }}">{{ post.title }}</a></span>
  <span>({{ post.date | date_to_long_string }})</span>
  <br />
  <p>{{ post.content | strip_html | truncatewords: 100 }}</p>
</div>
{% endfor %}
